[theme]
# Ardesia per slider/widget Streamlit; pulsanti primari neri via CSS in app
primaryColor = "#475569"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f9fafb"
textColor = "#111827"
font = "sans serif"

[server]
maxUploadSize = 5
enableXsrfProtection = true

[browser]
gatherUsageStats = false
