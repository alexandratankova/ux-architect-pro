[theme]
# Arancione accento (slider e widget Streamlit); i pulsanti primari sono neri via CSS in app
primaryColor = "#ff6b35"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f9fafb"
textColor = "#111827"
font = "sans serif"

[server]
maxUploadSize = 5
enableXsrfProtection = true

[browser]
gatherUsageStats = false
